name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - tr4ker-dev
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate userscripts
        run: python3 tools/build_userscripts.py --check

      - name: Check userscript syntax
        run: python3 tools/check_userscripts_syntax.py
